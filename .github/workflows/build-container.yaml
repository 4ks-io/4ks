name: Build and Publish Container

on:
  workflow_call:
    inputs:
      app_name:
        description: 'api | web | fetcher'
        required: true
        type: string
      # environment:
      #   description: 'dev | tst | prd'
      #   required: true
      #   type: string
      gcp_project_name:
        description: 'dev-4ks | tst-4ks | prd-4ks | eng-4ks'
        required: true
        type: string
      gcp_registry:
        description: 'container registry url'
        required: true
        type: string
      build_number:
        description: 'build number'
        required: true
        type: string
      run_tag:
        description: 'github run tag'
        required: true
        type: string
      workload_identity_provider:
        description: 'GCP Workload Identity Provider resource name'
        required: true
        type: string
      service_account:
        description: 'GCP service account email to impersonate'
        required: true
        type: string

jobs:
  build:
    name: container
    runs-on: ubuntu-latest
    # environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      # checkout
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      # cloud auth
      - name: GCP Auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}
      # cloud sdk
      - name: GCP Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
      # cloud config
      - name: GCP Config
        run: |
          # gcloud auth configure-docker -q
          gcloud auth configure-docker ${{ inputs.gcp_registry }} --quiet
      # package.json hack
      - name: PACKAGE_JSON hack
        run: |
          ./apps/web/package_json.sh
      # build
      - uses: docker/build-push-action@v7
        with:
          context: .
          cache-from: type=gha,scope=${{ inputs.app_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.app_name }}
          build-args: |
            VERSION=${{ inputs.build_number }}
          file: ./apps/${{ inputs.app_name }}/Dockerfile
          push: true
          tags: |
            ${{ inputs.gcp_registry }}/${{ inputs.gcp_project_name }}/${{ inputs.app_name }}/app:${{ inputs.build_number }}
            ${{ inputs.gcp_registry }}/${{ inputs.gcp_project_name }}/${{ inputs.app_name }}/app:${{ inputs.run_tag }}
            ${{ inputs.gcp_registry }}/${{ inputs.gcp_project_name }}/${{ inputs.app_name }}/app:latest
          # cache-from: type=registry,ref=4ks/${{APP}}-ci:buildcache
          # cache-to: type=registry,ref=4ks/${{APP}}-ci:buildcache,mode=max
