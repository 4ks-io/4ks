name: 'infra ci'

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - iac/**
      - .github/workflows/**

permissions:
  contents: read

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform Format
        run: terraform fmt -check -recursive iac

  validate:
    name: terraform validate (${{ matrix.directory }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          - iac/app
          - iac/base
          - iac/core
          - iac/eng
          - iac/sbx
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform Init
        run: terraform init -backend=false -input=false -no-color
      - name: Terraform Validate
        run: terraform validate -no-color
