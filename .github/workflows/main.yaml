name: main cd
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - go.mod
      - go.sum
      - go.work
      - go.work.sum
      - apps/**
      - libs/**
      - utils/**
      - iac/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            runtime: node
          - name: api
            runtime: go
            working_directory: .
            test_command: AUTH0_DOMAIN=example.auth0.com AUTH0_AUDIENCE=test go test ./...
          - name: fetcher
            runtime: go
            working_directory: apps/fetcher
            test_command: API_FETCHER_PSK=01234567890123456789012345678901
              API_ENDPOINT_URL=https://api.4ks.io/api/_fetcher/recipes
              PUBSUB_PROJECT_ID=test PUBSUB_TOPIC_ID=test go test ./...
          - name: uploader
            runtime: go
            working_directory: apps/media-upload
            test_command: DISTRIBUTION_BUCKET=test FIRESTORE_PROJECT_ID=test go test ./...
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        if: matrix.runtime == 'go'
        with:
          go-version-file: go.work
          cache-dependency-path: |
            go.sum
            apps/fetcher/go.sum
            apps/media-upload/go.sum
            utils/media-update/go.sum
            utils/recipe-search-refresh/go.sum
            utils/recipe-update/go.sum
      - name: Test ${{ matrix.name }}
        if: matrix.runtime == 'go'
        working-directory: ${{ matrix.working_directory }}
        run: ${{ matrix.test_command }}
      - uses: pnpm/action-setup@v4
        if: matrix.runtime == 'node'
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        if: matrix.runtime == 'node'
        with:
          node-version: 25.9.0
          cache: pnpm
      - name: Install dependencies
        if: matrix.runtime == 'node'
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Test ${{ matrix.name }}
        if: matrix.runtime == 'node'
        run: pnpm --filter @4ks/web test

  build:
    needs: test
    uses: ./.github/workflows/build-publish.yaml
    with:
      environment: dev
      build_number: ${{ github.sha }}
      run_tag: ${{ github.run_id }}.${{ github.run_number }}.${{ github.run_attempt }}
      workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      service_account: ${{ vars.GCP_BUILD_SERVICE_ACCOUNT }}

  # dev:
  #   needs: build
  #   uses: ./.github/workflows/run-terraform.yaml
  #   secrets:
  #     tf_api_token: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
  #     typesense_api_key: ${{ secrets.TYPESENSE_API_KEY_DEV }}
  #     typesense_client_api_key: ${{ secrets.TYPESENSE_CLIENT_API_KEY_DEV }}
  #     auth0_secret: ${{ secrets.AUTH0_SECRET_DEV }}
  #     auth0_client_secret: ${{ secrets.AUTH0_CLIENT_SECRET_DEV }}
  #   with:
  #     environment: dev
  #     build_number: ${{ github.sha }}
  #     workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  #     service_account: ${{ vars.GCP_DEV_TERRAFORM_SERVICE_ACCOUNT }}

  # review:
  #   needs: dev
  #   uses: ./.github/workflows/manual-review.yaml

  prd:
    # needs: dev
    needs: build
    uses: ./.github/workflows/run-terraform.yaml
    secrets:
      tf_api_token: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
      typesense_api_key: ${{ secrets.TYPESENSE_API_KEY_PRD }}
      typesense_client_api_key: ${{ secrets.TYPESENSE_CLIENT_API_KEY_PRD }}
      auth0_secret: ${{ secrets.AUTH0_SECRET_PRD }}
      auth0_client_secret: ${{ secrets.AUTH0_CLIENT_SECRET_PRD }}
    with:
      environment: prd
      build_number: ${{ github.sha }}
      workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      service_account: ${{ vars.GCP_PRD_TERRAFORM_SERVICE_ACCOUNT }}
